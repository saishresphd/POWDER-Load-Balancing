#!/bin/bash
# =============================================================================
# gNB configuration for srsRAN 4G NR SA gNB (srsenb/srsgnb)
# gnb1 at 10.10.1.2, connects to AMF at 10.10.1.1
# 10 ZMQ ports (1 per UE): TX 2000-2009, RX (UE-side TX) 2100-2109
# =============================================================================

# NOTE: srsRAN 4G srsenb supports NR SA via --config.sib.nr_cellconfig
# For ZMQ multi-UE, each UE gets its own port pair.

[enb]
enb_id = 0x19B
mcc = 999
mnc = 70
mme_addr = 10.10.1.1        # AMF (S1AP/NGAP)
gtp_bind_addr = 10.10.1.2   # GTP-U bind
s1c_bind_addr = 10.10.1.2   # S1/N2 bind
s1c_bind_port = 0
n_prb = 100                  # 20 MHz

[enb_files]
sib_config       = /etc/srsenb/sib.conf
rr_config        = /etc/srsenb/rr.conf
rb_config        = /etc/srsenb/rb.conf

[rf]
dl_earfcn = 3350             # Band 3, FDD
tx_gain   = 80
rx_gain   = 40
device_name = zmq
# 10 UE ZMQ ports (each UE has TX+RX pair)
# UE i: gNB-TX=200i, UE-TX=210i  (i=0..9)
device_args = fail_on_disconnect=false,\
id=enb1,\
tx_port0=tcp://10.10.1.2:2000,rx_port0=tcp://10.10.1.4:2100,\
tx_port1=tcp://10.10.1.2:2001,rx_port1=tcp://10.10.1.4:2101,\
tx_port2=tcp://10.10.1.2:2002,rx_port2=tcp://10.10.1.4:2102,\
tx_port3=tcp://10.10.1.2:2003,rx_port3=tcp://10.10.1.4:2103,\
tx_port4=tcp://10.10.1.2:2004,rx_port4=tcp://10.10.1.4:2104,\
tx_port5=tcp://10.10.1.2:2005,rx_port5=tcp://10.10.1.4:2105,\
tx_port6=tcp://10.10.1.2:2006,rx_port6=tcp://10.10.1.4:2106,\
tx_port7=tcp://10.10.1.2:2007,rx_port7=tcp://10.10.1.4:2107,\
tx_port8=tcp://10.10.1.2:2008,rx_port8=tcp://10.10.1.4:2108,\
tx_port9=tcp://10.10.1.2:2009,rx_port9=tcp://10.10.1.4:2109,\
base_srate=23.04e6

[log]
all_level   = warning
all_hex_limit = 32
filename    = /tmp/gnb1.log

[pcap]
enable  = none
